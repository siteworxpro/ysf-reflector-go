name: Test

on:
  push:

permissions:
  contents: read

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - run: make test-coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
