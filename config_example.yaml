# YSF Reflector configuration
callsign: A1234          # Your reflector callsign (max 10 characters)
port: 42000              # UDP port to listen on (standard YSF port is 42000)
timeout: 240             # Seconds before an idle client is disconnected
debug: false             # Log every packet (verbose)
parrot: false            # Buffer each transmission and replay it to all nodes after TX ends

# Reported in YSFS status query responses
id: 0                    # Numeric reflector ID (reported to querying nodes)
name: A1234 Reflector    # Reflector name (max 16 characters)
description: YSF Ref     # Short description (max 14 characters)

# WebSocket origin allowlist (optional).
# When omitted or empty the dashboard enforces same-origin — only browsers
# that loaded the page from the same host:port may open a WebSocket connection.
# Add entries here only when the dashboard is served behind a reverse proxy or
# accessed from a different hostname/port than the reflector itself.
#allowed_origins:
#  - https://dashboard.example.com
#  - http://192.168.1.10:8080
